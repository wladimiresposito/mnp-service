- name: urgent_symptoms_should_escalate
  tenant_id: clinic-demo
  input:
    context:
      tenant_id: clinic-demo
      session_id: yaml-003
      user_id: user-003
      user_text: "Estou com dor intensa e febre alta. O que faço?"
      facts:
        domain: healthcare
        contains_health_data: true
        contains_sensitive_health_data: true
        request_type: clinical_recommendation
        mentions_medication: false
        has_urgent_symptoms: true
        legal_basis_confirmed: true
        fact_extraction_confidence: 0.90
  expected:
    decision: escalate
    risk_level: critical
    required_rules:
      - urgent_symptoms_require_human_or_emergency_guidance
    required_changes:
      - escalate_to_human_review

