name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (com clingo obrigatorio)
        # O extra [dev] inclui clingo. Isto e deliberado: sem clingo, o
        # caminho simbolico nunca roda e a cross-validacao e pulada, que foi
        # exatamente como o "40 passed" original mascarou o ASP quebrado.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verificar que o clingo esta presente
        # Falha o build se o clingo nao instalou: a cross-validacao nao pode
        # ser silenciosamente pulada no CI.
        run: python -c "import clingo; print('clingo', clingo.__version__)"

      - name: Rodar a suite completa
        run: pytest -q

      - name: Garantir que a cross-validacao NAO foi pulada
        # Se algum teste de cross-validacao for skipped, o grep falha e o
        # build quebra. Rede de seguranca contra regressao do ambiente.
        run: |
          pytest tests/test_cross_validation.py tests/test_synthetic_differential.py -v | tee xval.txt
          if grep -qi "skipped" xval.txt; then
            echo "ERRO: cross-validacao Clingo/fallback foi pulada." >&2
            exit 1
          fi

      - name: Relatorio de divergencia em larga escala (gate 0 divergencias)
        # Roda 30k cenarios sinteticos nos dois motores. Falha se houver
        # qualquer divergencia de decisao.
        run: PYTHONPATH=. python scripts/divergence_report.py --n 10000 --seeds 1402 77 2024

      - name: Validar encadeamento das migracoes Alembic (offline)
        run: python -m alembic upgrade head --sql > /dev/null

  normative-golden-set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Rodar testes normativos YAML (golden set)
        run: pytest tests/test_normative_yaml.py -q
